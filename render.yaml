services:
  # Web Service (Backend + Frontend)
  - type: web
    name: social-automation
    env: node
    region: singapore
    plan: free
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FACEBOOK_ACCESS_TOKEN
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
    disk:
      name: social-automation-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
